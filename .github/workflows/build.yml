name: Build PiTrezor Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    # Шаг 1: Скачиваем ВАШ репозиторий (нужен только для custom-local.conf)
    - name: Checkout your repository
      uses: actions/checkout@v4

    # Шаг 2: Устанавливаем зависимости Yocto
    - name: Install Yocto dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
            gawk wget git diffstat unzip texinfo gcc-multilib build-essential \
            chrpath socat cpio python3 python3-pip python3-pexpect xz-utils \
            debianutils iputils-ping locales liblz4-tool zstd python-is-python3 \
            python3-jinja2 python3-git libegl1-mesa libsdl1.2-dev python3-subunit \
            mesa-common-dev file
        sudo locale-gen en_US.UTF-8

    # Шаг 3: Клонируем ОРИГИНАЛЬНЫЙ репозиторий PiTrezor
    - name: Clone original PiTrezor repository
      run: |
        git config --global url."https://".insteadOf git://
        git clone https://github.com/heneault/yocto-pitrezor.git pitrezor-build
        cd pitrezor-build
        git submodule update --init --recursive
        echo "✅ Original repository cloned"

    # Шаг 4: Подменяем local.conf на ваш
    - name: Replace local.conf with custom version
      run: |
        # Проверяем, что custom-local.conf существует
        if [ ! -f "custom-local.conf" ]; then
          echo "❌ Ошибка: файл custom-local.conf не найден в корне репозитория"
          exit 1
        fi
        
        # Инициализируем build-окружение (создает папку build/conf/)
        cd pitrezor-build
        source poky/oe-init-build-env build
        
        # Подменяем local.conf
        cp ../custom-local.conf conf/local.conf
        echo "✅ local.conf replaced with custom version"
        cat conf/local.conf

    # Шаг 5: Запускаем сборку
    - name: Build image
      run: |
        cd pitrezor-build
        source poky/oe-init-build-env build
        
        # Собираем образ для raspberrypi0-wifi
        bitbake pitrezor-image
        
        echo "✅ Build completed"

    # Шаг 6: Находим и архивируем готовый образ
    - name: Prepare artifact
      run: |
        cd pitrezor-build
        
        # Ищем готовый образ
        IMG_FILE=$(find build/tmp/deploy/images/raspberrypi0-wifi -name "*.img" -o -name "*.wic" -o -name "*.rpi-sdimg" 2>/dev/null | head -1)
        
        if [ -n "$IMG_FILE" ]; then
          echo "✅ Найден образ: $IMG_FILE"
          mkdir -p ../artifact
          cp "$IMG_FILE" ../artifact/
          cd ../artifact
          zip pitrezor-image.zip $(basename "$IMG_FILE")
        else
          echo "❌ Образ не найден"
          find build/tmp/deploy/images/ -type f | head -20
          exit 1
        fi

    # Шаг 7: Загружаем артефакт
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: pitrezor-image
        path: artifact/*.zip
        retention-days: 7
