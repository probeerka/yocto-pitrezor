name: Build PiTrezor Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Шаг 1: Настройка правила для хост-системы
    - name: Configure Git to use HTTPS instead of GIT protocol
      run: |
        git config --global url."https://".insteadOf git://

    # Шаг 2: Скачивание основного репозитория (без сабмодулей, их скачает Docker)
    - name: Checkout repository
      uses: actions/checkout@v4

    # Шаг 3: Исправляем Dockerfile (архивные репозитории + проброс настройки Git внутрь контейнера)
    - name: Fix Dockerfile for EOL repos and Git protocol inside container
      run: |
        # Исправляем репозитории Debian Buster
        sed -i '/FROM debian:buster/a RUN echo "deb http://debian.org buster main\\ndeb http://debian.org-security buster/updates main" > /etc/apt/sources.list' Dockerfile
        # Принудительно заставляем Git внутри Docker использовать HTTPS вместо git://
        sed -i '/FROM debian:buster/a RUN git config --global url."https://".insteadOf git://' Dockerfile

    # Шаг 4: Очистка диска
    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"

    # Шаг 5: Запуск компиляции в Docker
    - name: Run Build Script in Docker
      run: |
        chmod +x build-pitrezor.sh
        sudo ./build-pitrezor.sh master raspberrypi0-wifi

    # Шаг 6: Сохранение готового образа
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pitrezor-rpi0-image
        path: imgs/*.zip
