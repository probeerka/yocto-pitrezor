name: Build PiTrezor Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Шаг 1: Скачивание основного репозитория проекта
    - name: Checkout repository
      uses: actions/checkout@v4

    # Шаг 2: Глобальная замена протокола git:// на https:// на самом хосте GitHub
    - name: Configure Git to use HTTPS instead of GIT protocol
      run: |
        git config --global url."https://".insteadOf git://

    # Шаг 3: Очистка диска (сборка Yocto требует много свободного места)
    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"

    # Шаг 4: Модификация встроенного Dockerfile самого проекта yocto-pitrezor
    # Внедряем фикс Git прямо в контейнер, который будет собирать скрипт
    - name: Inject Git fix into internal project Dockerfile
      run: |
        if [ -f Dockerfile ]; then
          echo 'RUN git config --global url."https://".insteadOf git://' >> Dockerfile
          echo "=== Встроенный Dockerfile успешно модифицирован ==="
        else
          echo "Внимание: Файл Dockerfile не найден!"
        fi

    # Шаг 5: Запуск родного скрипта компиляции с принудительным сохранением PATH для Docker
    - name: Run Build Script
      run: |
        chmod +x build-pitrezor.sh
        # Флаг sudo -E принудительно прокидывает окружение пользователя (включая путь к docker) внутрь sudo
        sudo -E ./build-pitrezor.sh master raspberrypi0-wifi

    # Шаг 6: Сохранение готового образа
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pitrezor-rpi0-image
        path: build/*.zip  # Скрипт упаковывает результат в директорию build/
