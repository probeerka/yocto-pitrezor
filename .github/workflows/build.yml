name: Build PiTrezor Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Шаг 1: Скачивание основного репозитория проекта
    - name: Checkout repository
      uses: actions/checkout@v4

    # Шаг 2: Глобальная замена протокола git:// на https:// на самом хосте GitHub
    - name: Configure Git to use HTTPS instead of GIT protocol
      run: |
        git config --global url."https://".insteadOf git://

    # Шаг 3: Очистка диска (сборка Yocto требует много свободного места)
    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"

       # Шаг 4: Полная перезапись встроенного Dockerfile правильным и современным окружением
    - name: Rewrite internal project Dockerfile
      run: |
        cat << 'EOF' > Dockerfile
        FROM ubuntu:22.04

        # Отключаем интерактивные диалоги
        ENV DEBIAN_FRONTEND=noninteractive

        # Ставим пакеты (добавлен обязательный пакет 'file')
        RUN apt-get update && apt-get install -y \
            gawk wget git-core diffstat unzip texinfo gcc-multilib build-essential \
            chrpath socat cpio python3 python3-pip python3-pexpect xz-utils \
            debianutils iputils-ping locales liblz4-tool zstd python-is-python3 sudo file

        # Настраиваем локали для корректной работы BitBake
        RUN locale-gen en_US.UTF-8
        ENV LC_ALL=en_US.UTF-8
        ENV LANG=en_US.UTF-8
        ENV LANGUAGE=en_US.UTF-8

        # Настраиваем безопасный обход протокола git:// для всех пользователей контейнера
        RUN git config --global url."https://".insteadOf git://

        # Создаем пользователя build и даем ему права sudo
        RUN useradd -m -s /bin/bash build && \
            echo "build ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers

        USER build
        ENV HOME=/home/build
        WORKDIR /home/build

        # Продублируем глобальную настройку Git для созданного пользователя build
        RUN git config --global url."https://".insteadOf git://
        EOF
        echo "=== Встроенный Dockerfile успешно обновлен на Ubuntu 22.04 (добавлен пакет file) ==="
        
    # Шаг 5: Запуск родного скрипта компиляции проекта с пробросом окружения Docker
    - name: Run Build Script
      run: |
        chmod +x build-pitrezor.sh
        # Флаг -E обязателен, чтобы утилита sudo не теряла пути к командам Docker
        sudo -E ./build-pitrezor.sh master raspberrypi0-wifi || echo "Скрипт завершился с ошибкой, но пробуем найти образ..."

 # === ИСПРАВЛЕННЫЙ ШАГ: Ищем образ в папке imgs/ ===
    - name: Prepare and Zip Artifact
      run: |
        echo "=== Содержимое текущей директории ==="
        ls -la
        
        echo "=== Содержимое папки imgs/ ==="
        ls -la imgs/ || echo "⚠️ Папка imgs/ не найдена!"
        
        # Скрипт build-pitrezor.sh сохраняет образ в папку imgs/
        # И сразу создает zip архив
        if [ -f "imgs/pitrezor-raspberrypi0-wifi-master.zip" ]; then
          echo "✅ Найден готовый zip архив: imgs/pitrezor-raspberrypi0-wifi-master.zip"
          mkdir -p build
          cp imgs/pitrezor-raspberrypi0-wifi-master.zip build/
        elif [ -f "imgs/pitrezor-raspberrypi0-wifi-master.img" ]; then
          echo "✅ Найден образ: imgs/pitrezor-raspberrypi0-wifi-master.img"
          mkdir -p build
          cp imgs/pitrezor-raspberrypi0-wifi-master.img build/
          cd build
          zip pitrezor-rpi0-image.zip pitrezor-raspberrypi0-wifi-master.img
          cd ..
        else
          echo "❌ Ошибка: Образ не найден в папке imgs/"
          echo "=== Проверка других возможных локаций ==="
          find . -name "*.img" -o -name "*.zip" -o -name "*.wic" 2>/dev/null | head -20
          exit 1
        fi
        
        echo "✅ Архив подготовлен в build/"
        ls -la build/


    # Шаг 6: Сохранение готового образа
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pitrezor-rpi0-image
        path: build/*.zip  # Теперь этот шаг гарантированно найдет наш zip        
