name: Build PiTrezor Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Шаг 1: Скачивание основного репозитория
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false # Отключаем автоматический синк на хосте, сделаем это правильно

    # Шаг 2: Полная перезапись Dockerfile на базе стабильной Ubuntu 22.04
    - name: Rewrite Dockerfile with modern base image
      run: |
        cat << 'EOF' > Dockerfile
        FROM ubuntu:22.04

        ENV DEBIAN_FRONTEND=noninteractive

        # Обновляем систему и ставим актуальные пакеты сборки Yocto + sudo
        RUN apt-get update && \
            apt-get install -y gawk wget git diffstat unzip texinfo gcc-multilib build-essential \
            chrpath socat cpio python3 python3-pip python3-pexpect xz-utils debianutils \
            iputils-ping locales liblz4-tool zstd python-is-python3 sudo

        # Настройка локали en_US.UTF-8 (обязательно для BitBake)
        RUN locale-gen en_US.UTF-8
        ENV LC_ALL=en_US.UTF-8
        ENV LANG=en_US.UTF-8
        ENV LANGUAGE=en_US.UTF-8

        # Создаем изолированного пользователя для сборки (BitBake запрещено пускать под root)
        RUN useradd -m -s /bin/bash build && \
            echo "build ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers

        USER build
        ENV HOME=/home/build
        WORKDIR /home/build

        # Принудительный обход заблокированного git:// протокола ДЛЯ ПОЛЬЗОВАТЕЛЯ build
        RUN git config --global url."https://".insteadOf git://
        EOF

    # Шаг 3: Очистка диска
    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"

    # Шаг 4: Сборка Docker-образа
    - name: Build Docker Image
      run: |
        docker build -t yocto-builder .

    # Шаг 5: Запуск компиляции ВНУТРИ Docker-контейнера с правами текущего пользователя хоста
    - name: Run Build Script inside Docker
      run: |
        # Определяем UID и GID текущего пользователя на хосте GitHub Actions
        USER_ID=$(id -u)
        GROUP_ID=$(id -g)
        
        # Запускаем контейнер, сопоставляя права, чтобы не было ошибки Permission denied
        docker run --rm \
          -u $USER_ID:$GROUP_ID \
          -v ${{ github.workspace }}:/home/build/yocto-pitrezor \
          -w /home/build/yocto-pitrezor \
          yocto-builder \
          ./build-pitrezor.sh master raspberrypi0-wifi


    # Шаг 6: Сохранение готового образа
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pitrezor-rpi0-image
        path: imgs/*.zip
