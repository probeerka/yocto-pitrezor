name: Build PiTrezor Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Шаг 1: Настройка правила для хост-системы
    - name: Configure Git to use HTTPS instead of GIT protocol
      run: |
        git config --global url."https://".insteadOf git://

    # Шаг 2: Скачивание основного репозитория
    - name: Checkout repository
      uses: actions/checkout@v4

    # Шаг 3: Полная перезапись Dockerfile правильным и рабочим содержимым    # Шаг 3: Полная перезапись Dockerfile на базе стабильной Ubuntu 22.04
    - name: Rewrite Dockerfile with modern base image
      run: |
        cat << 'EOF' > Dockerfile
        FROM ubuntu:22.04

        # Отключаем интерактивные диалоги при установке пакетов
        ENV DEBIAN_FRONTEND=noninteractive

        # Обновляем систему и ставим актуальные пакеты сборки Yocto
        RUN apt-get update && \
            apt-get install -y gawk wget git-core diffstat unzip texinfo gcc-multilib build-essential chrpath socat cpio python3 python3-pip python3-pexpect xz-utils debianutils iputils-ping locales liblz4-tool zstd python-is-python3

        # Настраиваем принудительный обход заблокированного git:// протокола
        RUN git config --global url."https://".insteadOf git://

        # Настройка локали en_US.UTF-8 (обязательно для BitBake)
        RUN locale-gen en_US.UTF-8
        ENV LC_ALL=en_US.UTF-8
        ENV LANG=en_US.UTF-8
        ENV LANGUAGE=en_US.UTF-8

        # Создаем изолированного пользователя для сборки (BitBake запрещено пускать под root)
        RUN useradd -m build && chown -R build:build /home/build
        USER build
        ENV HOME=/home/build
        WORKDIR /home/build
        EOF

    # Шаг 4: Очистка диска
    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"

    # Шаг 5: Запуск компиляции в Docker
    - name: Run Build Script in Docker
      run: |
        chmod +x build-pitrezor.sh
        sudo ./build-pitrezor.sh master raspberrypi0-wifi

    # Шаг 6: Сохранение готового образа
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pitrezor-rpi0-image
        path: imgs/*.zip


